<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BurgerControl PRO MAX</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; }
.page { display:none }
.page.active { display:block }
</style>
</head>
<body class="bg-zinc-950 text-white">

<!-- HEADER -->
<div class="bg-gradient-to-r from-red-600 to-orange-500 p-5 rounded-b-3xl">
  <h1 class="font-bold text-xl">BurgerControl PRO MAX</h1>
</div>

<!-- DASH -->
<div id="home" class="page active p-4">
  <div class="grid grid-cols-2 gap-3">
    <div class="bg-zinc-900 p-3 rounded-xl"><p>Faturamento</p><h2 id="fat">R$0</h2></div>
    <div class="bg-zinc-900 p-3 rounded-xl"><p>Lucro</p><h2 id="lucro">R$0</h2></div>
    <div class="bg-zinc-900 p-3 rounded-xl"><p>Registros</p><h2 id="pedidos">0</h2></div>
    <div class="bg-zinc-900 p-3 rounded-xl"><p>Média</p><h2 id="ticket">R$0</h2></div>
  </div>
</div>

<!-- FINANCEIRO -->
<div id="financeiroPage" class="page p-4">
  <h2>Faturamento</h2>
  <div class="flex gap-2">
    <input id="valorDia" placeholder="Valor (opcional)" class="flex-1 p-2 bg-zinc-800 rounded">
    <button onclick="addFaturamento()" class="bg-green-500 px-3 rounded">+</button>
  </div>
  <div id="listaFinanceiro" class="mt-3"></div>

  <canvas id="grafico" class="mt-5"></canvas>
</div>

<!-- ESTOQUE -->
<div id="estoquePage" class="page p-4">
  <h2>Estoque</h2>
  <div class="flex gap-2">
    <input id="nomeItem" placeholder="Item" class="flex-1 p-2 bg-zinc-800 rounded">
    <input id="qtdItem" placeholder="Qtd" class="w-20 p-2 bg-zinc-800 rounded">
    <button onclick="addItem()" class="bg-orange-500 px-3 rounded">+</button>
  </div>
  <div id="listaEstoque" class="mt-3"></div>
</div>

<!-- RELATORIOS -->
<div id="relatorioPage" class="page p-4">
  <h2>Relatórios</h2>
  <div class="flex gap-2 mb-2">
    <button onclick="relatorioDias(7)" class="bg-zinc-800 px-3 py-2 rounded">7</button>
    <button onclick="relatorioDias(15)" class="bg-zinc-800 px-3 py-2 rounded">15</button>
    <button onclick="relatorioDias(30)" class="bg-zinc-800 px-3 py-2 rounded">30</button>
  </div>

  <h3 class="mt-3">Estoque</h3>
  <div id="relEstoque" class="bg-zinc-900 p-2 rounded"></div>

  <h3 class="mt-3">Financeiro</h3>
  <div id="relFinanceiro" class="bg-zinc-900 p-2 rounded"></div>
</div>

<!-- MENU -->
<div class="fixed bottom-0 w-full bg-zinc-900 flex justify-around py-2">
  <button onclick="nav('home')"><i class="ri-home-5-line"></i></button>
  <button onclick="nav('financeiroPage')"><i class="ri-money-dollar-circle-line"></i></button>
  <button onclick="nav('estoquePage')"><i class="ri-box-3-line"></i></button>
  <button onclick="nav('relatorioPage')"><i class="ri-bar-chart-line"></i></button>
</div>

<script>
let financeiro = JSON.parse(localStorage.getItem('financeiro'))||[]
let estoque = JSON.parse(localStorage.getItem('estoque'))||[]
let chart

function save(){
localStorage.setItem('financeiro',JSON.stringify(financeiro))
localStorage.setItem('estoque',JSON.stringify(estoque))
}

function nav(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'))
document.getElementById(p).classList.add('active')
}

function addFaturamento(){
let valor=parseFloat(valorDia.value)||0
financeiro.push({valor,data:new Date().toISOString()})
save();renderFinanceiro();atualizar();grafico()
}

function removerFinanceiro(i){
financeiro.splice(i,1)
save();renderFinanceiro();atualizar();grafico()
}

function renderFinanceiro(){
listaFinanceiro.innerHTML=''
financeiro.forEach((f,i)=>{
listaFinanceiro.innerHTML+=`<div class='flex justify-between bg-zinc-900 p-2 rounded'>
<span>R$${f.valor}</span>
<button onclick="removerFinanceiro(${i})">X</button>
</div>`
})}

function addItem(){
let nome=nomeItem.value.toLowerCase().trim()
let qtd=parseInt(qtdItem.value)
if(!nome||!qtd)return
let ex=estoque.find(e=>e.nome===nome)
if(ex){ex.qtd+=qtd}else{estoque.push({nome,qtd})}
save();renderEstoque()
}

function removerEstoque(i){
estoque.splice(i,1)
save();renderEstoque()
}

function renderEstoque(){
listaEstoque.innerHTML=''
estoque.forEach((e,i)=>{
listaEstoque.innerHTML+=`<div class='flex justify-between bg-zinc-900 p-2 rounded'>
<span>${e.nome} (${e.qtd})</span>
<button onclick="removerEstoque(${i})">X</button>
</div>`
})}

function atualizar(){
let total=financeiro.reduce((a,b)=>a+b.valor,0)
fat.innerText='R$'+total.toFixed(2)
lucro.innerText='R$'+(total*0.6).toFixed(2)
pedidos.innerText=financeiro.length
ticket.innerText='R$'+(financeiro.length?total/financeiro.length:0).toFixed(2)
}

function relatorioDias(dias){
let now=new Date()
let f=financeiro.filter(x=> (now-new Date(x.data))/(1000*60*60*24)<=dias)
let total=f.reduce((a,b)=>a+b.valor,0)
relFinanceiro.innerHTML=`Faturamento: R$${total.toFixed(2)}`

let est=estoque.map(e=>`${e.nome}: ${e.qtd}`).join('<br>')
relEstoque.innerHTML=est
}

function grafico(){
let labels=financeiro.map(f=> new Date(f.data).toLocaleDateString())
let data=financeiro.map(f=> f.valor)

if(chart) chart.destroy()

chart=new Chart(document.getElementById('grafico'),{
 type:'line',
 data:{labels:labels,datasets:[{data:data}]}
})
}

renderFinanceiro();renderEstoque();atualizar();grafico();
</script>

</body>
</html>
